<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <title>Bem vindo à Barba & Navalha</title>
    <link rel="stylesheet" href="/css/login.css" />
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <header class="header-auth">
  <img src="/img/logo1.jpg" alt="Barba & Navalha" class="logo-auth" />
</header>
    <main class="container">
      <form>
        <h1>Login</h1>
        <div class="input-box">
          <input placeholder="CPF" type="text" id="cpf" maxlength="14" inputmode="numeric" required />
          <i class="bx bxs-user"></i>
        </div>
        <div class="input-box">
          <input placeholder="Senha" type="password" />
          <i class="bx bxs-lock-alt"></i>
        </div>

        <div class="remember-forgot">
            <a href="/pages/senha.html">Esqueci a senha</a>
        </div>

        <button type="submit" class="login">Login</button>

        <div class="register-link">
            <p>Não tem uma conta? <a href="/pages/cadastro.html">Cadastra-se</a></p>
        </div>

      </form>
    </main>

    <script src="/js/login.js"></script>

  </body>
</html>
