<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar a senha</title>
    <link rel="icon" type="image/png" href="/img/logo1.jpg" />
    <link rel="stylesheet" href="/css/login.css" />
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <header class="header-auth">
  <img src="/img/logo1.jpg" alt="Barba & Navalha" class="logo-auth" />
</header>
    <main class="container">
      <form>
        <h1>Recuperar a senha</h1>
        <p style="text-align: center; margin-bottom: 20px; font-size: 14px">
          Informe o e-mail cadastrado. Enviaremos um link pra redefinir a senha.
        </p>
        <div class="input-box">
          <input placeholder="E-mail cadastrado" type="email" required />
          <i class="bx bxs-envelope"></i>
        </div>

        <button type="submit" class="login">Enviar link de recuperação</button>

        <div class="register-link">
          <p><a href="login.html">Voltar ao login</a></p>
        </div>
      </form>
    </main>
  </body>
</html>
